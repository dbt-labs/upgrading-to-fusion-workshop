config-version: 2

name: "jaffle_shop"
version: "3.0.0"
require-dbt-version: ">=1.5.0"

profile: upgrading_to_fusion

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["data-tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  "dbt_date:time_zone": "America/Los_Angeles"
  # Disable dbt_constraints on_run_end hook for Fusion (package uses Jinja incompatible with MiniJinja)
  dbt_constraints_enabled: false
  # Saved query export configuration - soft blocker
  enable_saved_query_exports: true
  saved_query_export_path: "exports/saved_queries"
  # Additional variables that may cause issues
  environment: "production"  # DEPRECATED: Should use target.name
  debug_mode: true  # Used by deprecated macros
  base_url: "https://api.example.com"  # Used in deprecated var usage
  expected_rows_customers: 1000
  expected_rows_orders: 5000

# Behavior change flags for modern dbt practices and migration testing
# (Fusion-removed flags omitted per dbt1005; Fusion only honors the following)
flags:
  require_model_names_without_spaces: true
  restrict_direct_pg_catalog_access: false
  require_batched_execution_for_custom_microbatch_strategy: false
  require_nested_cumulative_type_params: false
  validate_macro_args: true
  require_generic_test_arguments_property: true

models:
  jaffle_shop:
    staging:
      +materialized: view
    marts:
      +materialized: table
      +persist_docs:  # Missing + prefix (dbt Core ignores, Fusion validates)
        relation: true
        columns: true

seeds:
  jaffle_shop:
    +database: snowflake_learning_db
    +schema: jaffle_shop
    jaffle-data:
      +enabled: "{{ var('load_source_data', false) }}"